<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoicing System - Clients</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📄 Invoicing System</h2>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/invoices">Invoices</a>
      <a href="/clients" class="active">Clients</a>
      <a href="/products">Products</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h1>Clients</h1>
      <button class="btn btn-primary" onclick="openModal('clientModal')">+ New Client</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchClients" placeholder="Search clients..." oninput="searchClients()">
    </div>

    <!-- Clients Table -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="clientsTable">
          <tr>
            <td colspan="5" class="empty-state">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Client Modal -->
  <div class="modal" id="clientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="clientModalTitle">New Client</h3>
        <span class="close" onclick="closeModal('clientModal')">&times;</span>
      </div>
      <form id="clientForm" onsubmit="saveClient(event)">
        <input type="hidden" id="clientId">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="clientName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="clientEmail">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="clientPhone">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="clientAddress" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Client</button>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadClients);
  </script>
</body>
</html>

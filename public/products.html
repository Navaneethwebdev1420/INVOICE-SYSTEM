<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoicing System - Products</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📄 Invoicing System</h2>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/invoices">Invoices</a>
      <a href="/clients">Clients</a>
      <a href="/products" class="active">Products</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h1>Products</h1>
      <button class="btn btn-primary" onclick="openModal('productModal')">+ New Product</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchProducts" placeholder="Search products..." oninput="searchProducts()">
    </div>

    <!-- Products Table -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTable">
          <tr>
            <td colspan="4" class="empty-state">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="productModalTitle">New Product</h3>
        <span class="close" onclick="closeModal('productModal')">&times;</span>
      </div>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDescription" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="number" id="productPrice" step="0.01" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Product</button>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>
</body>
</html>
